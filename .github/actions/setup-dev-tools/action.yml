name: 'Setup Development Tools'
description: 'Install just and mise for development workflows'
runs:
  using: 'composite'
  steps:
    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Setup mise
      run: eval "$(mise activate bash)"
      shell: bash
