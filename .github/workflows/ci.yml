name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dev tools
        uses: ./.github/actions/setup-dev-tools

      - name: Build project
        run: just build-fast
        shell: bash

  lint:
    name: Kotlin Code Style
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dev tools
        uses: ./.github/actions/setup-dev-tools

      - name: Run ktlint
        run: just lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dev tools
        uses: ./.github/actions/setup-dev-tools

      - name: Run tests
        run: just test
