name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
permissions:
  pull-requests: write
  contents: read
jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run Trivy security scan
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Run the trivy scan
          TRIAGE_OUTPUT=$(just trivy-scan 2>&1 || true)
          EXIT_CODE=$?

          # Extract triage content (everything after "Running AI security triage")
          TRIAGE=$(echo "$TRIAGE_OUTPUT" | sed -n '/🤖 Running AI security triage/,$p' | tail -n +2)

          # Determine verdict
          if echo "$TRIAGE" | grep -q "VERDICT: BLOCK"; then
            VERDICT="BLOCK"
          elif echo "$TRIAGE" | grep -q "VERDICT: ALLOW"; then
            VERDICT="ALLOW"
          elif [ $EXIT_CODE -eq 0 ]; then
            VERDICT="ALLOW"
            TRIAGE="✅ No critical vulnerabilities found"
          else
            VERDICT="ERROR"
            TRIAGE="⚠️ Scan completed with errors"
          fi

          # Set outputs for PR comment
          echo "triage<<EOF" >> $GITHUB_OUTPUT
          echo "$TRIAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT

          # Add to step summary
          echo "$TRIAGE" >> $GITHUB_STEP_SUMMARY

          # Exit with original code
          exit $EXIT_CODE

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.json
          retention-days: 30
      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const triage = ${{ toJSON(steps.triage.outputs.triage) }};
            const verdict = "${{ steps.triage.outputs.verdict }}";
            const icon = verdict === "BLOCK" ? "🚨" : verdict === "ALLOW" ? "✅" : "ℹ️";
            const body = `## ${icon} Security Scan Results\n\n${triage}\n\n---\n*Generated by Claude*`;
            const { data: comments } = await github.rest.issues.listComments(
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes('Security Scan Results'));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
