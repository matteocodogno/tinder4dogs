name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
permissions:
  pull-requests: write
  contents: read
jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Create stub .envrc for mise
        run: touch .envrc

      - name: Security scan
        run: just security-scan

      - name: Print findings
        if: always()
        run: just security-report

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.json
          retention-days: 30

      - name: AI security triage
        id: triage
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          just security-triage || true

          TRIAGE=$(cat trivy-triage.txt 2>/dev/null || echo "Triage unavailable")
          echo "$TRIAGE" >> $GITHUB_STEP_SUMMARY
          echo "triage<<EOF" >> $GITHUB_OUTPUT
          echo "$TRIAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if echo "$TRIAGE" | grep -q "VERDICT: BLOCK"; then
            echo "verdict=BLOCK" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "verdict=ALLOW" >> $GITHUB_OUTPUT
          fi

      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const triage = ${{ toJSON(steps.triage.outputs.triage) }};
            const verdict = "${{ steps.triage.outputs.verdict }}";
            const icon = verdict === "BLOCK" ? "🚨" : verdict === "ALLOW" ? "✅" : "ℹ️";
            const body = `## ${icon} Security Scan Results\n\n${triage}\n\n---\n*Generated by Claude*`;
            const { data: comments } = await github.rest.issues.listComments(
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes('Security Scan Results'));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
