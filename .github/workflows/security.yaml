name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
permissions:
  pull-requests: write
  contents: read
jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run Trivy security scan
        id: scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: just trivy-scan
        continue-on-error: false

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.json
          retention-days: 30
      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            // Read Trivy report
            let reportContent = '⚠️ Scan report not found';
            let verdict = 'UNKNOWN';
            let icon = 'ℹ️';

            try {
              const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));
              const criticalCount = report.Results?.reduce((count, result) => {
                return count + (result.Vulnerabilities?.filter(v => v.Severity === 'CRITICAL').length || 0);
              }, 0) || 0;

              const highCount = report.Results?.reduce((count, result) => {
                return count + (result.Vulnerabilities?.filter(v => v.Severity === 'HIGH').length || 0);
              }, 0) || 0;

              // Check scan exit code
              const scanFailed = '${{ steps.scan.outcome }}' === 'failure';

              if (criticalCount === 0 && highCount === 0) {
                verdict = 'ALLOW';
                icon = '✅';
                reportContent = `No critical or high severity vulnerabilities found.`;
              } else if (scanFailed) {
                verdict = 'BLOCK';
                icon = '🚨';
                reportContent = `**Found ${criticalCount} CRITICAL and ${highCount} HIGH severity vulnerabilities.**\n\n`;
                reportContent += `AI triage determined this should **BLOCK** the build.\n\n`;
                reportContent += `See [Trivy report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
              } else {
                verdict = 'ALLOW';
                icon = '✅';
                reportContent = `Found ${criticalCount} CRITICAL and ${highCount} HIGH severity vulnerabilities.\n\n`;
                reportContent += `AI triage determined these are **ALLOWED** (low risk in this context).\n\n`;
                reportContent += `See [Trivy report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
              }
            } catch (error) {
              console.log('Error reading report:', error);
            }

            const body = `## ${icon} Security Scan Results\n\n${reportContent}\n\n---\n*Generated by Claude via Trivy*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body.includes('Security Scan Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
