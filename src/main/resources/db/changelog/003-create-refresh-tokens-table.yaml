databaseChangeLog:
  - changeSet:
      id: 003-create-refresh-tokens-table
      author: tinder4dogs
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_refresh_token_hash
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rt_owner
                    references: owners(id)
                    deleteCascade: true
              - column:
                  name: expires_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMPTZ
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_rt_owner
            tableName: refresh_tokens
            columns:
              - column:
                  name: owner_id
        - createIndex:
            indexName: idx_rt_hash
            tableName: refresh_tokens
            columns:
              - column:
                  name: token_hash
      rollback:
        - dropIndex:
            indexName: idx_rt_hash
            tableName: refresh_tokens
        - dropIndex:
            indexName: idx_rt_owner
            tableName: refresh_tokens
        - dropTable:
            tableName: refresh_tokens
