spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/tinderfordogs}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
