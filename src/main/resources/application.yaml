spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tinderfordogs}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080


litellm:
    url: http://localhost:4000
    key: ${LITELLM_MASTER_KEY}

openai:
    api-key: ${OPENAI_API_KEY:not-set}   # only needed for job submission

tinder4dogs:
    support:
        model: support-assistant
