spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/tinderfordogs}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8081


litellm:
    url: http://localhost:4000
    key: ${LITELLM_MASTER_KEY}

langfuse:
    url: http://localhost:3000
    public_key: ${LANGFUSE_PUBLIC_KEY}
    secret_key: ${LANGFUSE_SECRET_KEY}
    prompt:
        cache_ttl_seconds: 60
        label: production

openai:
    api-key: ${OPENAI_API_KEY:not-set}   # only needed for job submission

tinder4dogs:
    support:
        model: support-assistant

---
spring:
    config:
        activate:
            on-profile: dev

langfuse:
    prompt:
        label: latest

---
spring:
    config:
        activate:
            on-profile: test

langfuse:
    prompt:
        label: latest
        cache-ttl-seconds: 0   # always fresh in tests
