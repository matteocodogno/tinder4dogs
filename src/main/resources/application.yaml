spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/tinderfordogs}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false

server:
  port: 8081

litellm:
  url: http://localhost:4000
  key: ${LITELLM_MASTER_KEY}

openai:
  api-key: ${OPENAI_API_KEY:not-set}   # only needed for job submission

tinder4dogs:
  support:
    model: support-assistant

langfuse:
  url: http://localhost:3000
  public_key: test-public-key
  secret_key: test-secret-key
  prompt:
    cache_ttl_seconds: 0
    label: test
