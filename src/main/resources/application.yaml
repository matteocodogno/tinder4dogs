spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/tinderfordogs}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8081

litellm:
  url: http://localhost:4000
  key: ${LITELLM_MASTER_KEY}

openai:
  api-key: ${OPENAI_API_KEY:not-set}   # only needed for job submission

tinder4dogs:
  support:
    model: support-assistant
  security:
    jwt:
      secret: ${JWT_SECRET}
    bcrypt-strength: 12
    recaptcha:
      secret-key: ${RECAPTCHA_SECRET_KEY:test-secret}
      min-score: 0.5
      test-mode: ${RECAPTCHA_TEST_MODE:false}
    rate-limit:
      window-minutes: 30
      capacity: 5
      max-block-minutes: 60
  storage:
    photos-dir: ${PHOTOS_DIR:./uploads/photos}

langfuse:
  url: http://localhost:3000
  public_key: test-public-key
  secret_key: test-secret-key
  prompt:
    cache_ttl_seconds: 0
    label: test