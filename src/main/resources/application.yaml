spring:
  application:
    name: tinder-for-dogs
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/tinderfordogs}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8081


litellm:
    url: http://localhost:4000
    key: ${LITELLM_MASTER_KEY}

langfuse:
    url: http://localhost:3000
    public_key: ${LANGFUSE_PUBLIC_KEY}
    secret_key: ${LANGFUSE_SECRET_KEY}
    prompt:
        cache_ttl_seconds: 60
        label: production

openai:
    api-key: ${OPENAI_API_KEY:not-set}   # only needed for job submission

tinder4dogs:
    support:
        model: support-assistant
    jwt:
        secret: ${JWT_SECRET:tinder4dogs-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
        access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY_SECONDS:86400}

---
spring:
    config:
        activate:
            on-profile: dev

langfuse:
    prompt:
        label: latest

---
spring:
    config:
        activate:
            on-profile: test
    liquibase:
        enabled: false
    jpa:
        hibernate:
            ddl-auto: create-drop
    mail:
        host: localhost
        port: 1025

langfuse:
    prompt:
        label: latest
        cache-ttl-seconds: 0   # always fresh in tests
