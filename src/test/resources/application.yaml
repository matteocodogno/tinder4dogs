spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false
  mail:
    host: localhost
    port: 1025

server:
  port: 8081

litellm:
  url: http://localhost:4000
  key: test-key

langfuse:
  url: http://localhost:3000
  public_key: test-public-key
  secret_key: test-secret-key
  prompt:
    cache_ttl_seconds: 0
    label: latest

openai:
  api-key: not-set

tinder4dogs:
  support:
    model: support-assistant
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiry-seconds: 86400
